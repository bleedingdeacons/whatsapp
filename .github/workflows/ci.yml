name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: PHP 8.1
    runs-on: ubuntu-latest

    defaults:
      run:
        # WhatsApp is checked out alongside Rabbit and Sentinel, mirroring a
        # WordPress plugins/ directory, so run everything from inside WhatsApp.
        working-directory: whatsapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: whatsapp

      - name: Checkout Rabbit
        # WhatsApp is a Rabbit driver and implements its contracts.
        # Load-bearing for both gates: phpstan.neon scans ../rabbit/src so
        # cross-plugin symbols resolve, and tests/bootstrap.php requires the
        # same path at runtime. Rabbit was private until recently, which is
        # why neither check could run here at all.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/rabbit
          ref: main
          path: rabbit

      - name: Checkout Sentinel
        # Provides Sentinel_Log_Channel, referenced in type positions by HasLogger.
        # Scanned by phpstan.neon so cross-plugin symbols resolve.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/sentinel
          ref: main
          path: sentinel

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          # zip: build.php assembles the release archive with ZipArchive.
          extensions: mbstring, intl, json, zip
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          # Keyed on composer.json: composer.lock is untracked in several of
          # these repos, so it is not a reliable cache key across the suite.
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.1-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.1-composer-

      # --- Gates -----------------------------------------------------------
      # These fail the build. Each is verified to pass across the suite today.

      - name: Validate composer.json
        # --no-check-lock: composer.lock is untracked in some repos and drifted
        # from composer.json in others. Lock state is reported as advisory
        # below rather than blocking every PR in the suite.
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP syntax
        # Shipped code only: tests/ is covered by the advisory test run, and
        # some suites currently contain files that cannot be parsed.
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! out=$(php -l "$file" 2>&1); then
              echo "$out"
              status=1
            fi
          done < <(find . -path ./vendor -prune -o -path ./build -prune \
                        -o -path ./tests -prune -o -path ./node_modules -prune \
                        -o -name '*.php' -print0)
          exit $status

      - name: Build production archive
        # The build is what /bump ships, so a broken build must fail the PR.
        run: composer build:production

      - name: PHPStan
        # A gate, promoted from advisory now the repo is green. It ran
        # advisory for a long time, which hid that cross-plugin symbols were
        # unresolvable; the sibling checkouts above are what fixed that.
        run: composer stan

      - name: PHPUnit
        # A gate, promoted from advisory now the suite is green.
        run: composer test

      # --- Advisory --------------------------------------------------------
      # Reported but not yet enforced. Promote to a gate once a repo is green.

      - name: PHPCS (advisory)
        run: composer cs
        continue-on-error: true

      - name: composer.lock up to date (advisory)
        run: composer validate
        continue-on-error: true
